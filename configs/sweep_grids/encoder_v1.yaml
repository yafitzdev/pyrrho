# encoder_v1.yaml — Coordinate-descent sweep around the v1-attempt-4 baseline.
#
# `coordinate` mode: starts from baseline, then varies one axis at a time.
# This is much cheaper than a full grid and surfaces single-knob sensitivities.
# When two knobs interact you'll see it in the per-axis sweeps and can promote
# to `mode: grid` afterward.
#
# Run:
#   python scripts/sweep.py --grid configs/sweep_grids/encoder_v1.yaml
#   python scripts/sweep.py --grid configs/sweep_grids/encoder_v1.yaml --mode grid

base_config: configs/encoder/modernbert_base.yaml
output_base: outputs/sweeps/encoder_v1
mode: coordinate
seed: 42

# The v1 winning config (attempt 4). All coordinate cells start here.
baseline:
  training.label_smoothing: 0.15
  training.learning_rate: 5.0e-5
  training.num_train_epochs: 5
  training.class_weights: [2.3, 2.3, 1.0]
  training.warmup_ratio: 0.1
  training.weight_decay: 0.01

axes:
  training.label_smoothing: [0.0, 0.05, 0.1, 0.15, 0.2, 0.25]
  training.learning_rate: [2.0e-5, 3.0e-5, 5.0e-5, 8.0e-5, 1.0e-4]
  training.num_train_epochs: [3, 4, 5, 6, 8]
  training.class_weights:
    - null
    - [1.0, 1.0, 1.0]
    - [1.5, 1.5, 1.0]
    - [2.3, 2.3, 1.0]
    - [3.0, 3.0, 1.0]
  training.warmup_ratio: [0.0, 0.05, 0.1, 0.2]
  training.weight_decay: [0.0, 0.01, 0.1]
