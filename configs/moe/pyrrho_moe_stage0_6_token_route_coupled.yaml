# Stage 0.6 custom route-coupled token trunk.
#
# This is still a hash-token capacity probe, not the terminal 4B-A0.4B model.
# It keeps supervised semantic route as the active expert path, but replaces
# Stage 0.5 pooled-only processing with decoder-shaped token interaction:
# RoPE self-attention, RMSNorm pre-norms, and route-selected SwiGLU FFNs.

data:
  fitz_gov_hf: yafitzdev/fitz-gov
  fitz_gov_config: v8
  fitz_gov_revision: v8.0.0
  moe_output_dir: data/moe_v8
  max_seq_length: 4096
  scalar_fields:
    - trustworthy
    - disputed
    - abstain
    - confidence
    - grounding
    - conflict_density
    - evidence_sufficiency
    - domain_familiarity
    - false_trustworthy_risk
    - hallucination_pressure
    - retrieval_retry_value
    - human_escalation_score
    - query_evidence_alignment
    - answer_coverage
    - evidence_bias_score

stage0:
  target: stage0_6_token_route_coupled_student
  output_dir: outputs/moe/stage0_6_token_route_coupled_g3
  seed: 42
  model_kind: route_coupled_token
  token_vocab_size: 65536
  hidden_size: 384
  expert_hidden_size: 768
  num_expert_layers: 4
  num_attention_heads: 6
  num_key_value_heads: 2
  rope_theta: 10000.0
  dropout: 0.1
  max_seq_length: 512
  num_train_epochs: 5
  per_device_train_batch_size: 32
  per_device_eval_batch_size: 96
  learning_rate: 1.5e-4
  weight_decay: 0.01
  gradient_clip_norm: 1.0
  loss_weights:
    governance: 1.0
    route: 0.7
    taxonomy: 0.4
    scalar: 0.2
    distillation: 0.4
    load_balance: 0.02
    false_trustworthy_weight: 1.6
  governance_sample_weights:
    support_taxonomy_patterns:
      - consistent_chain
      - multi_source_corroboration
      - quantitative_consensus
    support_trustworthy_weight: 1.4
    ft_risk_routes:
      - science_medicine
    ft_risk_route_non_trustworthy_weight: 1.3
    ft_risk_taxonomy_patterns:
      - factual_contradiction
    ft_risk_taxonomy_non_trustworthy_weight: 1.4
