# Stage 0.6e guarded pattern-weighted recipe.
#
# 0.6c/0.6d proved per-pattern support weights can recover
# multi_source_corroboration and quantitative_consensus, but they leaked FT on
# contradiction/absence/partial-overlap families. This recipe keeps shorter
# Stage 0.6 context, uses moderate support weights, and broadens non-T risk
# weighting across the observed FT families.

data:
  fitz_gov_hf: yafitzdev/fitz-gov
  fitz_gov_config: v8
  fitz_gov_revision: v8.0.1
  moe_output_dir: data/moe_v8
  max_seq_length: 4096
  scalar_fields:
    - trustworthy
    - disputed
    - abstain
    - confidence
    - grounding
    - conflict_density
    - evidence_sufficiency
    - domain_familiarity
    - false_trustworthy_risk
    - hallucination_pressure
    - retrieval_retry_value
    - human_escalation_score
    - query_evidence_alignment
    - answer_coverage
    - evidence_bias_score

stage0:
  target: stage0_6e_guarded_pattern
  output_dir: outputs/moe/stage0_6e_guarded_pattern_g3_seed42
  seed: 42
  model_kind: route_coupled_token
  token_vocab_size: 65536
  hidden_size: 384
  expert_hidden_size: 768
  num_expert_layers: 4
  num_attention_heads: 6
  num_key_value_heads: 2
  rope_theta: 10000.0
  dropout: 0.1
  max_seq_length: 512
  num_train_epochs: 5
  per_device_train_batch_size: 32
  per_device_eval_batch_size: 96
  learning_rate: 1.5e-4
  weight_decay: 0.01
  gradient_clip_norm: 1.0
  loss_weights:
    governance: 1.0
    route: 0.7
    taxonomy: 0.4
    scalar: 0.2
    distillation: 0.45
    load_balance: 0.02
    false_trustworthy_weight: 1.8
  governance_sample_weights:
    support_taxonomy_patterns:
      - consistent_chain
      - multi_source_corroboration
      - quantitative_consensus
    support_trustworthy_weight: 1.15
    support_taxonomy_pattern_weights:
      consistent_chain: 1.2
      multi_source_corroboration: 2.2
      quantitative_consensus: 1.8
    ft_risk_routes:
      - science_medicine
      - general_commonsense
      - technology_computing
    ft_risk_route_non_trustworthy_weight: 1.5
    ft_risk_taxonomy_patterns:
      - factual_contradiction
      - evidence_absent
      - partial_overlap
      - numerical_conflict
      - scope_conflict
      - temporal_mismatch
      - wrong_entity
      - wrong_specificity
    ft_risk_taxonomy_non_trustworthy_weight: 2.0
