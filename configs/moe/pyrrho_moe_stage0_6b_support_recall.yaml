# Stage 0.6b support-recall recipe.
#
# Keeps the Stage 0.6 token route-coupled trunk, but retunes the recipe for
# multi-context TRUSTWORTHY support patterns. The main changes versus 0.6 are:
# longer evidence visibility, stronger g3 teacher distillation, stronger
# TRUSTWORTHY support-pattern weighting, and slightly lower global anti-T
# pressure so support rows are not over-abstained.

data:
  fitz_gov_hf: yafitzdev/fitz-gov
  fitz_gov_config: v8
  fitz_gov_revision: v8.0.1
  moe_output_dir: data/moe_v8
  max_seq_length: 4096
  scalar_fields:
    - trustworthy
    - disputed
    - abstain
    - confidence
    - grounding
    - conflict_density
    - evidence_sufficiency
    - domain_familiarity
    - false_trustworthy_risk
    - hallucination_pressure
    - retrieval_retry_value
    - human_escalation_score
    - query_evidence_alignment
    - answer_coverage
    - evidence_bias_score

stage0:
  target: stage0_6b_support_recall
  output_dir: outputs/moe/stage0_6b_support_recall_g3_seed42
  seed: 42
  model_kind: route_coupled_token
  token_vocab_size: 65536
  hidden_size: 384
  expert_hidden_size: 768
  num_expert_layers: 4
  num_attention_heads: 6
  num_key_value_heads: 2
  rope_theta: 10000.0
  dropout: 0.1
  max_seq_length: 768
  num_train_epochs: 5
  per_device_train_batch_size: 24
  per_device_eval_batch_size: 64
  learning_rate: 1.5e-4
  weight_decay: 0.01
  gradient_clip_norm: 1.0
  loss_weights:
    governance: 1.0
    route: 0.7
    taxonomy: 0.4
    scalar: 0.2
    distillation: 0.6
    load_balance: 0.02
    false_trustworthy_weight: 1.45
  governance_sample_weights:
    support_taxonomy_patterns:
      - consistent_chain
      - multi_source_corroboration
      - quantitative_consensus
    support_trustworthy_weight: 2.2
    ft_risk_routes:
      - science_medicine
    ft_risk_route_non_trustworthy_weight: 1.25
    ft_risk_taxonomy_patterns:
      - factual_contradiction
    ft_risk_taxonomy_non_trustworthy_weight: 1.35
