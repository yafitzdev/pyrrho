# Stage 0.5 custom route-coupled student.
#
# This is a capacity probe, not the terminal 4B-A0.4B model. It keeps the
# Stage 0 hash-token data path but makes the supervised semantic route the
# active expert path through every residual expert layer.

data:
  fitz_gov_hf: yafitzdev/fitz-gov
  fitz_gov_config: v8
  fitz_gov_revision: v8.0.0
  moe_output_dir: data/moe_v8
  max_seq_length: 4096
  scalar_fields:
    - trustworthy
    - disputed
    - abstain
    - confidence
    - grounding
    - conflict_density
    - evidence_sufficiency
    - domain_familiarity
    - false_trustworthy_risk
    - hallucination_pressure
    - retrieval_retry_value
    - human_escalation_score
    - query_evidence_alignment
    - answer_coverage
    - evidence_bias_score

stage0:
  target: stage0_5_route_coupled_student
  output_dir: outputs/moe/stage0_5_route_coupled_g3_govbalanced
  seed: 42
  model_kind: route_coupled
  token_vocab_size: 65536
  hidden_size: 384
  expert_hidden_size: 768
  num_expert_layers: 4
  dropout: 0.1
  max_seq_length: 768
  num_train_epochs: 6
  per_device_train_batch_size: 128
  per_device_eval_batch_size: 256
  learning_rate: 2.0e-4
  weight_decay: 0.01
  gradient_clip_norm: 1.0
  loss_weights:
    governance: 1.0
    route: 0.7
    taxonomy: 0.3
    scalar: 0.2
    distillation: 0.5
    load_balance: 0.02
    false_trustworthy_weight: 1.5
