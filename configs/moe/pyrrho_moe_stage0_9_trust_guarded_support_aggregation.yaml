# Stage 0.9 trust-guarded support-aggregation probe.
#
# Keeps Stage 0.7's support-aggregation trunk, then adds a decoupled binary
# verifier over candidate governance logits. The guard is explicitly supervised
# to accept TRUSTWORTHY rows and reject non-TRUSTWORTHY rows, with extra weight
# on the risk slices that drove Stage 0.7 false-TRUSTWORTHY regressions.

data:
  fitz_gov_hf: yafitzdev/fitz-gov
  fitz_gov_config: v8
  fitz_gov_revision: v8.0.1
  moe_output_dir: data/moe_v8
  max_seq_length: 4096
  scalar_fields:
    - trustworthy
    - disputed
    - abstain
    - confidence
    - grounding
    - conflict_density
    - evidence_sufficiency
    - domain_familiarity
    - false_trustworthy_risk
    - hallucination_pressure
    - retrieval_retry_value
    - human_escalation_score
    - query_evidence_alignment
    - answer_coverage
    - evidence_bias_score

stage0:
  target: stage0_9_trust_guarded_support_aggregation
  output_dir: outputs/moe/stage0_9_trust_guarded_support_aggregation_g3_seed42
  seed: 42
  model_kind: trust_guarded_support_aggregating_token
  token_vocab_size: 65536
  hidden_size: 384
  expert_hidden_size: 768
  num_expert_layers: 4
  num_attention_heads: 6
  num_key_value_heads: 2
  rope_theta: 10000.0
  dropout: 0.1
  max_seq_length: 512
  max_query_length: 96
  max_sources: 8
  max_source_length: 192
  trust_guard_scale: 0.65
  trust_guard_init_bias: 2.0
  trust_guard_detach_candidate_logits: true
  num_train_epochs: 4
  per_device_train_batch_size: 24
  per_device_eval_batch_size: 64
  learning_rate: 1.5e-4
  weight_decay: 0.01
  gradient_clip_norm: 1.0
  loss_weights:
    governance: 1.0
    route: 0.7
    taxonomy: 0.4
    scalar: 0.2
    distillation: 0.4
    load_balance: 0.02
    false_trustworthy_weight: 1.6
    trust_guard: 0.35
  governance_sample_weights:
    support_taxonomy_patterns:
      - consistent_chain
      - multi_source_corroboration
      - quantitative_consensus
    support_trustworthy_weight: 1.4
    ft_risk_routes:
      - science_medicine
    ft_risk_route_non_trustworthy_weight: 1.3
    ft_risk_taxonomy_patterns:
      - factual_contradiction
    ft_risk_taxonomy_non_trustworthy_weight: 1.4
  trust_guard_targets:
    positive_support_taxonomy_patterns:
      - consistent_chain
      - multi_source_corroboration
      - quantitative_consensus
      - expert_consensus
    positive_support_weight: 1.35
    negative_risk_routes:
      - science_medicine
      - general_commonsense
      - technology_computing
    negative_risk_route_weight: 1.35
    negative_risk_taxonomy_patterns:
      - factual_contradiction
      - evidence_absent
      - partial_overlap
      - numerical_conflict
      - temporal_conflict
      - temporal_mismatch
      - wrong_entity
      - wrong_specificity
      - scope_conflict
    negative_risk_taxonomy_weight: 1.7
