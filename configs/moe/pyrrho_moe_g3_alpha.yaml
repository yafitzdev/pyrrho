# pyrrho-MoE-g3-alpha — custom 4B-A0.4B sparse MoE baseline.
# Canonical spec: docs/PYRRHO_MOE_ARCHITECTURE.md.

architecture:
  layers: 24
  hidden_size: 1024
  attention_heads: 16
  kv_heads: 4
  ffn_dim: 3840
  dense_ffn_layers: 4
  moe_ffn_layers: 20
  experts_per_moe_layer: 16
  top_k: 1
  vocab_size: 64000
  tied_embeddings: true
  taxonomy_patterns: 23
  scalar_heads: 15
  governance_classes: 3
  semantic_expert_groups:
    - science_medicine
    - law_policy
    - history_geography
    - technology_computing
    - economics_finance
    - culture_society
    - general_commonsense
    - conflict_detection

seed_candidate:
  status: preliminary
  note: >
    2026-05-26 HF API check found Qwen/Qwen3-0.6B-Base as the closest public
    Apache-2.0 dense seed by hidden size/layer shape (1024 hidden, 28 layers,
    SwiGLU, GQA). Its 151,936-token vocabulary does not match the 64k budget,
    so the alpha keeps the architecture tokenizer-neutral until the upcycling
    path decides whether to remap tokenizer embeddings or adjust the budget.
  model_id: Qwen/Qwen3-0.6B-Base
  license: apache-2.0
  hidden_size: 1024
  num_hidden_layers: 28
  intermediate_size: 3072
  num_attention_heads: 16
  num_key_value_heads: 8
  vocab_size: 151936

data:
  fitz_gov_hf: yafitzdev/fitz-gov
  fitz_gov_config: v8
  fitz_gov_revision: v8.0.0
  moe_output_dir: data/moe_v8
  max_seq_length: 4096
  scalar_fields:
    - trustworthy
    - disputed
    - abstain
    - confidence
    - grounding
    - conflict_density
    - evidence_sufficiency
    - domain_familiarity
    - false_trustworthy_risk
    - hallucination_pressure
    - retrieval_retry_value
    - human_escalation_score
    - query_evidence_alignment
    - answer_coverage
    - evidence_bias_score

stage0:
  target: tiny-route-prototype
  output_dir: outputs/moe/stage0_route_proto
  seed: 42
  token_vocab_size: 32768
  hidden_size: 256
  expert_hidden_size: 512
  dropout: 0.1
  max_seq_length: 768
  num_train_epochs: 3
  per_device_train_batch_size: 64
  per_device_eval_batch_size: 128
  learning_rate: 3.0e-4
  weight_decay: 0.01
  gradient_clip_norm: 1.0
  loss_weights:
    governance: 1.0
    route: 0.7
    taxonomy: 0.3
    scalar: 0.2
    load_balance: 0.02
    false_trustworthy_weight: 2.3
