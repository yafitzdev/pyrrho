# pyrrho-MoE-g4-real - OLMoE stock-runtime carrier candidate.
#
# This is the current public-carrier candidate after the user rejected public
# Mixtral/Qwen metadata. A tiny random OlmoeForCausalLM checkpoint converts with
# clean upstream llama.cpp and loads/generates with clean upstream llama-cli.
#
# OLMoE carrier constraints observed in the tiny proof:
# - untied output embeddings are required by the stock converter/runtime path
# - num_key_value_heads must equal num_attention_heads for the stock OLMoE
#   q/k norm tensor shape
# - tokenizer/vocab follows the OLMoE tokenizer seed: 50,304 tokens
#
# This config is a parameter/runtime-shape gate candidate. It is not trained.

name: pyrrho-MoE-g4-real

architecture:
  runtime_carrier: OlmoeForCausalLM
  model_type: olmoe
  layers: 24
  hidden_size: 1024
  attention_heads: 16
  kv_heads: 16
  attention_qk_norms: true
  ffn_dim: 2688
  dense_ffn_layers: 0
  moe_ffn_layers: 24
  experts_per_moe_layer: 19
  top_k: 1
  vocab_size: 50304
  tied_embeddings: false
  taxonomy_patterns: 23
  scalar_heads: 15
  governance_classes: 3
  semantic_expert_groups:
    - science_medicine
    - law_policy
    - history_geography
    - technology_computing
    - economics_finance
    - culture_society
    - general_commonsense
