# pyrrho-nano-g4 official V9.0.0 multitask ModernBERT encoder.
# Data: published fitz-gov V9.0.0 official query-grouped splits.

model:
  base_model: answerdotai/ModernBERT-base
  init_from: outputs/pyrrho-nano-g3_2_retrieval_control/seed_1337/best_model
  dropout: 0.0

architecture:
  semantic_expert_groups:
    - science_medicine
    - law_policy
    - history_geography
    - technology_computing
    - economics_finance
    - culture_society
    - general_commonsense

data:
  fitz_gov_hf: yafitzdev/fitz-gov
  fitz_gov_config: v9
  fitz_gov_revision: v9.0.0
  moe_output_dir: data/multitask_g4_v9_official
  input_dir: data/multitask_g4_v9_official
  require_query_contract: true
  require_retrieval_control: true
  max_seq_length: 4096
  max_query_length: 256
  scalar_fields:
    - evidence_sufficiency
    - query_evidence_alignment
    - answer_coverage
    - conflict_density
    - retrieval_retry_value
    - false_trustworthy_risk
    - evidence_failure_severity

training:
  output_dir: outputs/pyrrho-nano-g4_v9_official/seed_1337
  num_train_epochs: 2
  per_device_train_batch_size: 8
  per_device_eval_batch_size: 16
  gradient_accumulation_steps: 2
  num_workers: 0
  learning_rate: 2.0e-5
  weight_decay: 0.01
  warmup_ratio: 0.05
  max_grad_norm: 1.0
  bf16: true
  label_smoothing: 0.10
  governance_class_weights: [2.3, 2.3, 1.0]
  balance_query_contract: true
  seed: 1337

loss:
  governance: 1.0
  query_contract: 0.55
  route: 0.20
  taxonomy: 0.25
  scalars: 0.25
  retrieval_action: 0.20
  gap_type: 0.20
  answerability_shape: 0.18
  retrieval_modality: 0.12
