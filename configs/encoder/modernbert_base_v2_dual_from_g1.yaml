# pyrrho v2 dual-mode: continue from pyrrho-v2-nano-g1 and add query-only planning.

model:
  base_model: models/pyrrho-v2-nano-g1

data:
  max_seq_length: 2048
  input_mode: dual

training:
  output_dir: ./outputs/modernbert_base_v2_dual_from_g1
  num_train_epochs: 1
  per_device_train_batch_size: 16
  per_device_eval_batch_size: 32
  gradient_accumulation_steps: 1
  gradient_checkpointing: false

  learning_rate: 1.0e-5
  weight_decay: 0.01
  warmup_ratio: 0.05
  lr_scheduler_type: cosine

  bf16: true
  optim: adamw_torch_fused

  label_smoothing: 0.02
  loss_weights:
    evidence_verdict: 1.5
    failure_mode: 1.0
    retrieval_intents: 1.0
    evidence_kinds: 1.0

  eval_strategy: epoch
  save_strategy: epoch
  save_total_limit: 2
  load_best_model_at_end: true
  metric_for_best_model: overall_score
  greater_is_better: true
  early_stopping_patience: 2

  logging_steps: 20
  report_to: none
  run_name: pyrrho-v2-dual-from-g1-modernbert
  seed: 42
