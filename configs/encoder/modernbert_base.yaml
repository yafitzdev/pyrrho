# pyrrho-modernbert-base-v1 â€” Track A1
# Production governance head for fitz-sage. CPU target after INT8 ONNX export.
#
# Expected wall-clock on RTX 5090: 15-30 min
# Expected accuracy: 82-86% overall, 78-84% trustworthy recall, 3-5% false-trustworthy

model:
  base_model: answerdotai/ModernBERT-base
  num_labels: 3
  id2label:
    0: ABSTAIN
    1: DISPUTED
    2: TRUSTWORTHY
  label2id:
    ABSTAIN: 0
    DISPUTED: 1
    TRUSTWORTHY: 2

data:
  fitz_gov_path: ../fitz-gov/data
  tier1_split:
    stratify_by: [category, difficulty, domain]
    train_ratio: 0.8
    seed: 42
  max_seq_length: 4096
  truncation: longest_first

training:
  output_dir: ./outputs/modernbert_base_v1
  # v1 attempt 1 (epochs=5, class_weights=2.3/2.3/1.0, macro_f1 selection):
  #   eval acc 87.5%, FT 13.6%, tier0 73.3%. FT gate FAIL. macro_f1 picked the
  #   most-overfit checkpoint (epoch 5). Epoch 4 was actually better balance.
  # v1 attempt 2 (epochs=3, no weights, ls=0.1, ft_pen): under-trained (early
  #   stop fired at epoch 2). Eval acc 73.8% FT 8.1% â€” both gates failed.
  # v1 attempt 3 (epochs=5, weights=2.3/2.3/1.0, ls=0.1, patience=2, ft_pen):
  #   eval acc 83.2%, FT 5.51%, tier0 73.3%. ACC + FT gates PASS, tier0 FAIL.
  #   Uncalibrated tier0 was 83.3% (vs 73.3% attempt 1) â€” label smoothing fixed
  #   tier0 DISPUTED (91.7% recall). The drop to 73.3% comes from threshold
  #   calibration (Ď„=0.67) sacrificing tier0 TRUSTWORTHY (75% â†’ 55.6%) to hit FT.
  # v1 attempt 4 (ls=0.15, weights=2.3/2.3/1.0, 5ep, patience=2, ft_pen):
  #   eval acc 87.2%, FT 5.51%, tier0 81.7%. ACC + FT gates PASS.
  #   Tier0 capped at ~80% across full Ď„ sweep â€” intrinsic to model.
  #   Failure decomposition (tier0 uncal): 8 TRUSTWORTHYâ†’ABSTAIN dominant error,
  #   3 DISPUTEDâ†’TRUSTWORTHY, 1 DISPUTEDâ†’ABSTAIN.
  #   The 8 trustworthyâ†’abstain is the class-weights signature: with weights
  #   2.3/2.3/1.0 + label_smoothing 0.15, both regularizers push the model
  #   toward minority classes; label smoothing is now doing the calibration
  #   work, so the weights are double-counted regularization.
  # v1 attempt 5 (ls=0.15, no weights): underfit. eval acc 74.1%, FT 11.0%,
  #   tier0 76.7%. Same tier0 pattern (13 trustworthy â†’ abstain/disputed) so
  #   removing weights didn't fix the structural issue. Class weights weren't
  #   the cause â€” the model genuinely struggles with a subset of tier0
  #   TRUSTWORTHY cases.
  # Reverting to attempt 4 settings (the best so far) while we inspect the
  # actual failing cases to find the structural problem.
  num_train_epochs: 5
  per_device_train_batch_size: 16
  per_device_eval_batch_size: 32
  gradient_accumulation_steps: 1
  gradient_checkpointing: false

  learning_rate: 5.0e-5

  # Reverted to attempt 4 settings (the best so far). Combats TRUSTWORTHY
  # over-prediction (53% of training data). Order: [ABSTAIN, DISPUTED, TRUSTWORTHY].
  class_weights: [2.3, 2.3, 1.0]

  # Label smoothing reduces overconfidence; helps calibration of P(TRUSTWORTHY)
  # which directly drives the false-trustworthy rate. Bumped to 0.15 in
  # attempt 4 (was 0.1 in attempt 3, which left FT 10.66% uncalibrated).
  label_smoothing: 0.15

  weight_decay: 0.01
  warmup_ratio: 0.1
  lr_scheduler_type: cosine

  bf16: true
  optim: adamw_torch_fused

  eval_strategy: epoch
  save_strategy: epoch
  save_total_limit: 2
  load_best_model_at_end: true

  # Selection metric:
  #   ft_penalized_accuracy = accuracy - 3.0 * max(0, FT - 0.057)
  # When FT is under the gate, this equals accuracy. When FT exceeds the gate,
  # each point of excess costs 3 points of selection score, so the trainer
  # prefers checkpoints that are calibrated.
  metric_for_best_model: ft_penalized_accuracy
  greater_is_better: true

  # Stop training if the selection metric does not improve for N evals.
  # Patience 2 lets the model push through one bad epoch (attempt 2 stopped
  # too early at epoch 2 because ft_pen briefly worsened).
  early_stopping_patience: 2

  logging_steps: 20
  report_to: [wandb]
  run_name: pyrrho-modernbert-base-v1
  seed: 42

eval:
  cv_folds: 5
  metrics:
    - accuracy
    - macro_f1
    - per_class_recall
    - per_class_precision
    - false_trustworthy_rate
  breakdowns:
    - difficulty
    - domain
    - reasoning_type
    - query_type

export:
  format: onnx
  quantization: int8
  output_path: ./models/pyrrho-modernbert-base-v1.onnx
