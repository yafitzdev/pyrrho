# pyrrho v2 alpha: ModernBERT-base, multi-head evidence-schema classifier.
# Trains on fitz-gov-v2 accepted rows from fitz-gov-modern_generator.

model:
  base_model: answerdotai/ModernBERT-base

data:
  max_seq_length: 2048
  input_mode: dual

training:
  output_dir: ./outputs/modernbert_base_v2_dual_alpha
  num_train_epochs: 3
  per_device_train_batch_size: 16
  per_device_eval_batch_size: 32
  gradient_accumulation_steps: 1
  gradient_checkpointing: false

  learning_rate: 5.0e-5
  weight_decay: 0.01
  warmup_ratio: 0.1
  lr_scheduler_type: cosine

  bf16: true
  optim: adamw_torch_fused

  label_smoothing: 0.05
  loss_weights:
    evidence_verdict: 1.5
    failure_mode: 1.0
    retrieval_intents: 1.0
    evidence_kinds: 1.0

  eval_strategy: epoch
  save_strategy: epoch
  save_total_limit: 2
  load_best_model_at_end: true
  metric_for_best_model: overall_score
  greater_is_better: true
  early_stopping_patience: 2

  logging_steps: 20
  report_to: none
  run_name: pyrrho-v2-alpha-modernbert
  seed: 42
